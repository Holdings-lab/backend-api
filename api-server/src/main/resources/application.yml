server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pwa_db}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jackson:
    serialization:
      indent_output: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

# Management endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

webhook:
  # FastAPI에서 Webhook 요청 시 Header에 포함되어야 하는 안전용 비밀키
  secret: ${WEBHOOK_SECRET}

firebase:
  # Firebase 서비스 계정 키 위치 (src/main/resources 아래에 배치)
  config-path: ${FIREBASE_CONFIG_PATH}

integration:
  ml:
    # data-ml Flask API 베이스 URL
    base-url: ${ML_API_BASE_URL:http://localhost:9000}