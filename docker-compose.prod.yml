version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-holdings}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Spring Boot API Server
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: pwa-api-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-holdings}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      FIREBASE_CONFIG_PATH: /app/config/serviceAccountKey.json
    ports:
      - "8080:8080"
    volumes:
      - ./api-server/src/main/resources/serviceAccountKey.json:/app/config/serviceAccountKey.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  # Python Data-ML Service (scheduler + immediate APIs)
  data-ml:
    build:
      context: ./data-ml
      dockerfile: Dockerfile
    container_name: pwa-data-ml
    restart: unless-stopped
    environment:
      ML_API_PORT: 9000
      SCHEDULE_MODE: ${SCHEDULE_MODE:-hourly}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  # FastAPI AI Engine
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: pwa-ai-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api-server:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-holdings}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WEBHOOK_URL: http://api-server:8080/api/internal/webhook/event
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "8000:8000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
